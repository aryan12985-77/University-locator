<!DOCTYPE html>
<html>
<head>
    <title>Campus Navigator</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    
    <!-- Routing CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>
</head>

<body>

<div class="main-container">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <h2>Campus Navigator</h2>

        <a href="/">🏠 New Search</a>
        <a href="#" onclick="locateUser()">📍 My Location</a>
        <a href="#" onclick="toggleSidebar()">🗺 Toggle View</a>
    </div>

    <!-- MAP AREA -->
    <div class="map-container">

        <div class="toggle-btn" onclick="toggleSidebar()">☰</div>

        <!-- MAP -->
        <div id="map"></div>

        <div id="destinationInfo" class="info-box"></div>

        <button id="locateBtn">📍</button>

    </div>

</div>

<!-- ✅ PASS DESTINATION FROM FLASK -->
<script>
    var destination = "{{ destination }}";
</script>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Routing JS -->
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<!-- ✅ YOUR MAIN LOGIC FILE -->
<script src="{{ url_for('static', filename='js/map.js') }}"></script>

</body>
</html>
